<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecom AI | Churn Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f093fb;
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            background: var(--glass);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 850px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 2.2rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .section-title {
            grid-column: 1 / -1;
            font-size: 0.85rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 25px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            padding-bottom: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; }

        label {
            font-size: 0.75rem;
            margin-bottom: 8px;
            color: #b0c4de;
            font-weight: 600;
        }

        input, select {
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.25);
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
        }

        option { background: #1b333d; color: white; }

        .button-group {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            margin-top: 35px;
        }

        .btn {
            padding: 18px;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-predict { background: linear-gradient(45deg, var(--secondary), var(--accent)); }
        .btn-reset { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); }

        .btn:hover { transform: scale(1.02); opacity: 0.9; }

        #result {
            margin-top: 30px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .churn { background: rgba(255, 75, 43, 0.15); border: 1px solid #ff4b2b; color: #ff8a75; }
        .stay { background: rgba(56, 239, 125, 0.15); border: 1px solid #38ef7d; color: #85ffb0; }

        .prob-bar-container {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }
        .prob-bar-fill { height: 100%; transition: width 1s ease-in-out; }
    </style>
</head>
<body>

<div class="container">
    <h2>Telecom AI Predictor</h2>

    <div class="grid" id="predictionForm">
        <div class="section-title">Customer Profile</div>
        <div class="form-group">
            <label>Gender</label>
            <select id="gender"><option value="Male">Male</option><option value="Female">Female</option></select>
        </div>
        <div class="form-group">
            <label>Senior Citizen</label>
            <select id="SeniorCitizen"><option value="0">No</option><option value="1">Yes</option></select>
        </div>
        <div class="form-group"><label>Partner</label><select id="Partner"><option value="Yes">Yes</option><option value="No">No</option></select></div>
        <div class="form-group"><label>Dependents</label><select id="Dependents"><option value="No">No</option><option value="Yes">Yes</option></select></div>

        <div class="section-title">Subscription</div>
        <div class="form-group"><label>Internet Service</label><select id="InternetService"><option value="Fiber optic">Fiber optic</option><option value="DSL">DSL</option><option value="No">No</option></select></div>
        <div class="form-group"><label>Contract Type</label><select id="Contract"><option value="Month-to-month">Month-to-month</option><option value="One year">One year</option><option value="Two year">Two year</option></select></div>
        <div class="form-group"><label>Tenure (Months)</label><input type="number" id="tenure" value="12"></div>
        <div class="form-group"><label>Multiple Lines</label><select id="MultipleLines"><option value="No">No</option><option value="Yes">Yes</option><option value="No phone service">No phone service</option></select></div>

        <div class="section-title">Protection & Security</div>
        <div class="form-group"><label>Online Security</label><select id="OnlineSecurity"><option value="No">No</option><option value="Yes">Yes</option><option value="No internet service">No internet service</option></select></div>
        <div class="form-group"><label>Online Backup</label><select id="OnlineBackup"><option value="No">No</option><option value="Yes">Yes</option><option value="No internet service">No internet service</option></select></div>
        <div class="form-group"><label>Device Protection</label><select id="DeviceProtection"><option value="No">No</option><option value="Yes">Yes</option><option value="No internet service">No internet service</option></select></div>
        <div class="form-group"><label>Tech Support</label><select id="TechSupport"><option value="No">No</option><option value="Yes">Yes</option><option value="No internet service">No internet service</option></select></div>

        <div class="section-title">Billing</div>
        <div class="form-group">
            <label>Payment Method</label>
            <select id="PaymentMethod">
                <option value="Electronic check">Electronic check</option>
                <option value="Mailed check">Mailed check</option>
                <option value="Bank transfer (automatic)">Bank transfer </option>
                <option value="Credit card (automatic)">Credit card </option>
            </select>
        </div>
        <div class="form-group"><label>Paperless Bill</label><select id="PaperlessBilling"><option value="Yes">Yes</option><option value="No">No</option></select></div>
        <div class="form-group"><label>Monthly Charges ($)</label><input type="number" step="0.01" id="MonthlyCharges" value="70.00"></div>
        <div class="form-group"><label>Total Charges ($)</label><input type="number" step="0.01" id="TotalCharges" value="840.00"></div>

        <div class="button-group">
            <button class="btn btn-predict" onclick="predict()">Analyze Churn Risk</button>
            <button class="btn btn-reset" onclick="resetForm()">Reset</button>
        </div>
    </div>

    <div id="result"></div>
</div>

<script>
    function resetForm() {
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            if (input.type === 'number') input.value = input.defaultValue || 0;
            else input.selectedIndex = 0;
        });
        const resultDiv = document.getElementById("result");
        resultDiv.style.display = "none";
    }

    async function predict() {
        const resultDiv = document.getElementById("result");
        resultDiv.style.display = "block";
        resultDiv.innerHTML = "📡 Syncing categories with AI Model...";
        resultDiv.className = "";

        const ids = [
            "gender", "SeniorCitizen", "Partner", "Dependents", "tenure",
            "MultipleLines", "InternetService", "OnlineSecurity", "OnlineBackup",
            "DeviceProtection", "TechSupport", "Contract", "PaperlessBilling",
            "PaymentMethod", "MonthlyCharges", "TotalCharges"
        ];

        const data = {};
        ids.forEach(id => {
            const el = document.getElementById(id);
            if (id === "tenure" || id === "SeniorCitizen") data[id] = parseInt(el.value) || 0;
            else if (id.includes("Charges")) data[id] = parseFloat(el.value) || 0.0;
            else data[id] = el.value;
        });

        // HIDDEN 19 FEATURES COMPLIANCE
        data["PhoneService"] = "Yes";
        data["StreamingTV"] = "No";
        data["StreamingMovies"] = "No";

        try {
            const response = await fetch("http://127.0.0.1:8000/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const resData = await response.json();

            if (response.ok) {
    const churnProb = parseFloat(resData.probability); // Probability of Churn
    const stayProb = (100 - churnProb).toFixed(1);     // Probability of Stay
    const isChurn = resData.prediction === 1;

    // UI Feedback colors
    const churnColor = "#ff4b2b"; // Red
    const stayColor = "#38ef7d";  // Green

    resultDiv.innerHTML = `
        <div style="font-size: 1.6rem; font-weight: 700; margin-bottom: 20px;">${resData.result}</div>

        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px;">
            <span>Retention Probability</span>
            <span style="font-weight: bold; color: ${stayColor};">${stayProb}%</span>
        </div>
        <div class="prob-bar-container" style="margin-top: 0; margin-bottom: 15px;">
            <div class="prob-bar-fill" style="width: ${stayProb}%; background: ${stayColor};"></div>
        </div>

        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px;">
            <span>Churn Risk</span>
            <span style="font-weight: bold; color: ${churnColor};">${churnProb}%</span>
        </div>
        <div class="prob-bar-container" style="margin-top: 0;">
            <div class="prob-bar-fill" style="width: ${churnProb}%; background: ${churnColor};"></div>
        </div>

        <div style="margin-top: 20px; font-size: 0.85rem; font-weight: 600; letter-spacing: 1.5px; color: ${isChurn ? churnColor : stayColor};">
            STATUS: ${resData.risk_level.toUpperCase()} RISK DETECTED
        </div>
    `;
    resultDiv.classList.add(isChurn ? "churn" : "stay");
}if (response.ok) {
    const churnProb = parseFloat(resData.probability); // Probability of Churn
    const stayProb = (100 - churnProb).toFixed(1);     // Probability of Stay
    const isChurn = resData.prediction === 1;

    // UI Feedback colors
    const churnColor = "#ff4b2b"; // Red
    const stayColor = "#38ef7d";  // Green

    resultDiv.innerHTML = `
        <div style="font-size: 1.6rem; font-weight: 700; margin-bottom: 20px;">${resData.result}</div>

        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px;">
            <span>Retention Probability</span>
            <span style="font-weight: bold; color: ${stayColor};">${stayProb}%</span>
        </div>
        <div class="prob-bar-container" style="margin-top: 0; margin-bottom: 15px;">
            <div class="prob-bar-fill" style="width: ${stayProb}%; background: ${stayColor};"></div>
        </div>

        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px;">
            <span>Churn Risk</span>
            <span style="font-weight: bold; color: ${churnColor};">${churnProb}%</span>
        </div>
        <div class="prob-bar-container" style="margin-top: 0;">
            <div class="prob-bar-fill" style="width: ${churnProb}%; background: ${churnColor};"></div>
        </div>

        <div style="margin-top: 20px; font-size: 0.85rem; font-weight: 600; letter-spacing: 1.5px; color: ${isChurn ? churnColor : stayColor};">
            STATUS: ${resData.risk_level.toUpperCase()} RISK DETECTED
        </div>
    `;
    resultDiv.classList.add(isChurn ? "churn" : "stay");
} else {
                resultDiv.innerHTML = "❌ Model Error: " + resData.detail;
                resultDiv.classList.add("churn");
            }
        } catch (err) {
            resultDiv.innerHTML = "❌ API Connection Failed";
            resultDiv.classList.add("churn");
        }
    }
</script>
</body>
</html>
